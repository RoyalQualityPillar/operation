<div class="table-box">
  <mat-table [dataSource]="planningOrderListData" matSort id="dataTable" class="table_background_color">
          <ng-container matColumnDef="ff0001">
      <mat-header-cell *matHeaderCellDef mat-sort-header>
        Product Number
      </mat-header-cell>
      <mat-cell *matCellDef="let row"> {{ row.uc0001 }} </mat-cell>
    </ng-container>

    <ng-container matColumnDef="ff0003">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Product Code
      </mat-header-cell>
      <mat-cell *matCellDef="let row"> {{ row.ff0001 }} </mat-cell>
    </ng-container>

    <ng-container matColumnDef="ff0004">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Product Name
      </mat-header-cell>
      <mat-cell *matCellDef="let row"> {{ row.ff0016 }} </mat-cell>
    </ng-container>    

    <ng-container matColumnDef="ff0006">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Quantity
      </mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.ff0010 }}</mat-cell>
    </ng-container>
    
    <ng-container matColumnDef="createdon">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Created Date
      </mat-header-cell>
      <mat-cell *matCellDef="let row">
        {{ row.createdon | customDatePipe : "dateWithHrMin" }}
      </mat-cell>
    </ng-container>
    <ng-container matColumnDef="createdby">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Created By
      </mat-header-cell>
      <mat-cell *matCellDef="let row">
        {{ row.createdby }}
      </mat-cell>
    </ng-container>

    <ng-container matColumnDef="action">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Batch
      </mat-header-cell>
      <mat-cell *matCellDef="let row">
        <mat-icon class="cursor" (click)="submit(row)" > toggle_on </mat-icon>
      </mat-cell>
    </ng-container>   

    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns"></mat-row>
  </mat-table>

  <mat-paginator [pageSizeOptions]="[10, 15, 20, 25]" (page)="pageChanged($event)" showFirstLastButtons
    aria-label="Select page of periodic rows">
  </mat-paginator>
</div>
