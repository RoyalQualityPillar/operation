<div class="row gx-0 create-update-dialog-header-section">
  <div class="col-10 d-flex justify-content-start">
    <h1 class="daialog-title-name p-2">Approved Material List</h1>
  </div>
  <div class="col-2 d-flex justify-content-end">
    <button mat-icon-button class="close-button" [mat-dialog-close]="true">
      <mat-icon class="close-icon" color="warn">close</mat-icon>
    </button>
  </div>
</div>
<div class="table-box">
  <mat-table [dataSource]="tableData" matTableExporter class="table_background_color" matSort id="dataTable">
    <ng-container matColumnDef="action">
      <mat-header-cell *matHeaderCellDef>
        Action
      </mat-header-cell>

      <mat-cell *matCellDef="let row">
        <mat-radio-button name="selectedRow" [value]="row" (change)="setSelectedID(row)">
        </mat-radio-button>
      </mat-cell>
    </ng-container>
    
    <ng-container matColumnDef="ff0001">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Material Number
      </mat-header-cell>
      <mat-cell *matCellDef="let row"> {{ row.ff0004 }} </mat-cell>
    </ng-container>

    <ng-container matColumnDef="ff0002">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Material Name
      </mat-header-cell>
      <mat-cell *matCellDef="let row"> {{ row.ff0003 }} </mat-cell>
    </ng-container>

    <ng-container matColumnDef="ff0004">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Quantity
      </mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.ff0004 }}</mat-cell>
    </ng-container>
   
   <ng-container matColumnDef="ff0005">
      <mat-header-cell *matHeaderCellDef mat-sort-header>UOM
      </mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.ff0006 }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="ff0012">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Product Code
      </mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.ff0002 }}</mat-cell>
    </ng-container>
    <ng-container matColumnDef="createdon">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Created On
      </mat-header-cell>
      <mat-cell *matCellDef="let row">{{
        row.createdon | customDatePipe : "dateWithHrMin" 
        }}</mat-cell>
    </ng-container>
    <ng-container matColumnDef="createdby">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Created By
      </mat-header-cell>
      <mat-cell *matCellDef="let row"> {{ row.createdby }}</mat-cell>
    </ng-container>
    <!-- <ng-container matColumnDef="status">
            <mat-header-cell *matHeaderCellDef mat-sort-header>Status
            </mat-header-cell>
            <mat-cell *matCellDef="let row"> {{ row.status }}</mat-cell>
          </ng-container> -->

    <mat-header-row *matHeaderRowDef="addedUserdisplayedColumns"></mat-header-row>
    <mat-row *matRowDef="let row; columns: addedUserdisplayedColumns"></mat-row>
  </mat-table>
  <mat-paginator [pageSizeOptions]="[10, 15, 20, 25]" (page)="pageChanged($event)" showFirstLastButtons
    aria-label="Select page of periodic rows">
  </mat-paginator>
  <button
          mat-raised-button
          class="submitButton"
          (click)="onSubmit('row')"
        >
          Submit
        </button>
</div>
