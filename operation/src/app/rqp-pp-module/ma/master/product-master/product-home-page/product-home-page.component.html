<mat-tab-group
  animationDuration="500ms"
  class="m-1"
  #tabGroup
  (selectedTabChange)="tabChanged($event)"
>
  <mat-tab aria-label="Tab7">
    <ng-template mat-tab-label>
      <div>
        <div class="section_header_title">All Product Master</div>
      </div>
    </ng-template>
    <div class="margin-left_10 margin-right_10">
      <button
        mat-raised-button
        class="add-new-record"
        (click)="onOpenRolePOPUP()"
      >
        Add New Record
      </button>
    </div>
    <app-common-table-filter
      [columnConfig]="columnConfig"
      [filterOptions]="filterOptions"
      [apiUrl]="allDmproductTableDataUrl"
      tableTitle="All Product Master"
      [dynamicButtons]="allButtonConfig"
      (buttonClick)="handleButtonAction($event)"
      columnClass="rqp-life-cycle-table-columns"
      [filterApiUrl]="filterApiUrl"
      [HttpMethod]="HttpMethod"
      [params]="params"
      downloadFileName="  Dmproduct  "
    ></app-common-table-filter>

    <div style="height: 50px"></div>
  </mat-tab>
  <mat-tab aria-label="Tab6">
    <ng-template mat-tab-label>
      <div>
        <div class="section_header_title">Active Product Master</div>
      </div>
    </ng-template>
    <div class="margin-left_10 margin-right_10">
      <button
        mat-raised-button
        class="add-new-record"
        (click)="onOpenRolePOPUP()"
      >
        Add New Record
      </button>
    </div>
    <app-common-table-filter
      [columnConfig]="columnConfig"
      [filterOptions]="filterOptions"
      [apiUrl]="activeDmproductTableDataUrl"
      tableTitle="Active Product Master"
      [dynamicButtons]="activeButtonConfig"
      (buttonClick)="activeHandleButtonAction($event)"
      columnClass="rqp-life-cycle-table-columns"
      [filterApiUrl]="filterApiUrl"
      [HttpMethod]="HttpMethod"
      [params]="params"
      downloadFileName="  Dmproduct  "
    ></app-common-table-filter>
  </mat-tab>
</mat-tab-group>
