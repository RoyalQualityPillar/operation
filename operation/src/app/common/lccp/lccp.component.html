<div [formGroup]="stage" class="display">
  <div *ngIf="stage.get('type').value === 'From - To'">
    <mat-form-field>
      <mat-label>Select a Stage</mat-label>
      <mat-select
        (selectionChange)="changeStage()"
        formControlName="stageLevel"
      >
        <mat-option
          *ngFor="let element of stageList; let i = index"
          [value]="element.stage"
        >
          {{ element.stage }}
        </mat-option>
      </mat-select>
    </mat-form-field>
  </div>

  <div>
    <mat-form-field>
      <mat-label>Select Type</mat-label>
      <mat-select formControlName="type" (selectionChange)="selectType()">
        <mat-option
          *ngFor="let element of list; let i = index"
          [value]="element.name"
        >
          {{ element.name }}
        </mat-option>
      </mat-select>
    </mat-form-field>
  </div>

  <ng-container *ngIf="stage.get('type').value === 'Day'">
    <div>
      <mat-form-field>
        <mat-label>Choose a date</mat-label>
        <input
          matInput
          formControlName="day"
          [matDatepicker]="picker2"
          (dateChange)="getYearMonthData()"
        />
        <mat-hint>MM/DD/YYYY</mat-hint>
        <mat-datepicker-toggle
          matIconSuffix
          [for]="picker2"
        ></mat-datepicker-toggle>
        <mat-datepicker #picker2></mat-datepicker>
      </mat-form-field>
    </div>
  </ng-container>

  <ng-container
    *ngIf="
      stage.get('type').value === 'From - To' ||
      stage.get('type').value === 'Week' ||
      stage.get('type').value === 'Year - Month' ||
      stage.get('type').value === 'Month - Week' ||
      stage.get('type').value === 'Week - Day' ||
      stage.get('type').value === 'Year - Year'
    "
  >
    <div class="margin-top_15">
      <mat-form-field class="example-form-field">
        <mat-label>Choose a Start Date</mat-label>
        <input
          matInput
          formControlName="startDate"
          [matDatepicker]="picker6"
          (dateChange)="getYearMonthData()"
        />
        <mat-datepicker-toggle
          matIconSuffix
          [for]="picker6"
        ></mat-datepicker-toggle>
        <mat-datepicker #picker6></mat-datepicker>
        <mat-error
          style="width: 230%"
          *ngIf="stage.get('startDate').hasError('invalidDate')"
        >
          {{ inValidMessage }}
        </mat-error>
      </mat-form-field>

      <mat-form-field class="example-form-field">
        <mat-label>Choose a End Date</mat-label>
        <input
          matInput
          formControlName="endDate"
          [matDatepicker]="picker7"
          (dateChange)="getYearMonthData()"
        />
        <mat-datepicker-toggle
          matIconSuffix
          [for]="picker7"
        ></mat-datepicker-toggle>
        <mat-datepicker #picker7></mat-datepicker>
      </mat-form-field>
    </div>
  </ng-container>
</div>

<div class="chart-adjust">
  <div style="margin-top: 5px; margin-left: 5px">
    <mat-grid-list cols="4" rowHeight="3:1">
      <mat-grid-tile>
        <div class="tile-content">
          <button
            mat-raised-button
            class="custom-tile1"
            style="height: 100%; width: 100%"
          >
            chart 1
          </button>
        </div>
      </mat-grid-tile>
      <mat-grid-tile>
        <div class="tile-content">
          <button
            mat-raised-button
            class="custom-tile2"
            style="height: 100%; width: 100%"
          >
            chart 2
          </button>
        </div>
      </mat-grid-tile>
      <mat-grid-tile>
        <div class="tile-content">
          <button
            mat-raised-button
            class="custom-tile3"
            style="height: 100%; width: 100%"
          >
            chart 3
          </button>
        </div>
      </mat-grid-tile>
      <mat-grid-tile>
        <div class="tile-content">
          <button
            mat-raised-button
            class="custom-tile4"
            style="height: 100%; width: 100%"
          >
            chart 4
          </button>
        </div>
      </mat-grid-tile>
    </mat-grid-list>
  </div>
</div>
<div class="chart-section">
  <div class="chart-row mt-2 pt-2">
    <div class="chart-container">
      <apx-chart
        *ngIf="isPieChartDataAvailable"
        [series]="piechartOptions.series"
        [chart]="piechartOptions.chart"
        [labels]="piechartOptions.labels"
        [responsive]="piechartOptions.responsive"
      ></apx-chart>
    </div>
    <div class="chart-container">
      <apx-chart
        *ngIf="isPieChartDataAvailable"
        [series]="donutchartOptions.series"
        [chart]="donutchartOptions.chart"
        [labels]="donutchartOptions.labels"
        [responsive]="donutchartOptions.responsive"
      ></apx-chart>
    </div>
  </div>
  <div class="chart-row mt-2">
    <div class="chart-container">
      <apx-chart
        [series]="chartOptions?.series"
        [chart]="chartOptions?.chart"
        [dataLabels]="chartOptions?.dataLabels"
        [plotOptions]="chartOptions?.plotOptions"
        [yaxis]="chartOptions?.yaxis"
        [xaxis]="chartOptions?.xaxis"
        [legend]="chartOptions?.legend"
        [colors]="chartOptions?.colors"
        [grid]="chartOptions?.grid"
      ></apx-chart>
    </div>
    <div class="chart-container">
      <apx-chart
        *ngIf="isPieChartDataAvailable"
        [series]="linechartOptions.series"
        [chart]="linechartOptions.chart"
        [xaxis]="linechartOptions.xaxis"
        [dataLabels]="linechartOptions.dataLabels"
        [grid]="linechartOptions.grid"
        [stroke]="linechartOptions.stroke"
        [title]="linechartOptions.title"
      ></apx-chart>
    </div>
  </div>
</div>
