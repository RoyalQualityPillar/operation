<mat-spinner
  *ngIf="isLoading"
  class="global-loading-spinner"
  color="primary"
  mode="indeterminate"
></mat-spinner>
<div class="row gx-0 create-update-dialog-header-section">
  <div class="col-10 d-flex justify-content-start">
    <h1 class="daialog-title-name p-2">
      Calibration Schedule {{ this.userData.type }}
      <!-- <span>{{ this.userData.type }}{{ this.userData.type }}</span> -->
    </h1>
  </div>
  <div class="col-2 d-flex justify-content-end">
    <button mat-icon-button class="close-button" [mat-dialog-close]="true">
      <mat-icon class="close-icon" color="warn">close</mat-icon>
    </button>
  </div>
</div>
<div class="screenOverFlowY">
  <form [formGroup]="DepartmentMaster" class="margin-top_7">
    <mat-card>
      <div class="p-2">
        <div class="section_header">
          <p class="section_header_title">Calibration Schedule information</p>
        </div>
      </div>
      <div class="row">
        <div class="col-12">
          <div class="p-2">
            <div class="row no-gutters pb-2 ms-1 me-1">
              <span clss="form-validation-msg"
                >Required Fields are denoted by an asterisk(<span
                  class="color_red"
                  >*</span
                >).</span
              >
            </div>
            <div class="row no-gutters ms-1 me-1 dense-4 orgCode"><br />
              <mat-form-field appearance="outline" class="col-12 px-1">
                <mat-label>Unit Code</mat-label>
                <input type="text" matInput readonly formControlName="unitcode" (change)="onChangePlantCode2()" />
              </mat-form-field>
            </div>
            <div class="row no-gutters ms-1 me-1 dense-4">
              <!-- <div class="orgCode">
                <mat-form-field appearance="outline" class="col-12 px-1">
                  <mat-label>Organization Unit Code</mat-label>
                  <input
                    type="text"
                    matInput
                    readonly
                    formControlName="ff0004"
                    (change)="onChangePlantCode()"
                  />
                </mat-form-field>
              </div> -->

             
            </div>
            <div class="row no-gutters ms-1 me-1 dense-4">
              <mat-form-field appearance="outline" class="col-6 px-1" *ngIf="isUpdate">
                  <mat-label>Schedule No</mat-label>
                  <input
                    type="text"
                    matInput
                    formControlName="uc0001"
                    [readonly]="isUpdate"
                    [class.isReadonlyField]="isUpdate"
                    placeholder="Schedule No"
                  />
                </mat-form-field>
              <mat-form-field appearance="outline" class="col-6 px-1">
                <mat-label>Inustrument No</mat-label>
                <input
                  type="text"
                  matInput
                  formControlName="ff0001"
                  placeholder="Inustrument No"
                  (change)="onChangeModuleNo()"
                />
                 <img
                  alt="lov img"
                  src="../../../../../../assets/searchfind.svg"
                  class="icon-size lovSearchButton"
                  color="primary"
                  (click)="openCIndexListLOV()"
                />
              </mat-form-field>

              <mat-form-field appearance="outline" class="col-6 px-1">
                <mat-label>Data Sheet No.</mat-label>
                <input
                  type="text"
                  matInput
                  formControlName="ff0002"
                  placeholder="Data Sheet No."
                  (change)="onChangeSheetNo()"

                />
                 <img
                  alt="lov img"
                  src="../../../../../../assets/searchfind.svg"
                  class="icon-size lovSearchButton"
                  color="primary"
                  (click)="openCIndexListLOV()"
                />
              </mat-form-field>

              <mat-form-field appearance="outline" class="col-6 px-1">
                <mat-label>Frequency Code</mat-label>
                <input
                  type="text"
                  matInput
                  formControlName="ff0003"
                  placeholder="Frequency Code"
                  (change)="onChangeFrequencyCode()"
                />
                 <img
                  alt="lov img"
                  src="../../../../../../assets/searchfind.svg"
                  class="icon-size lovSearchButton"
                  color="primary"
                  (click)="openFrequencyListLOV()"
                />
              </mat-form-field>
               <mat-form-field appearance="outline" class="col-6 px-1">
                <mat-label>Start Date</mat-label>
                <input
                  type="text"
                  matInput
                   [matDatepicker]="picker"
                  formControlName="ff0004"
                  placeholder="Start Date"
                />
                 <mat-datepicker-toggle
                  matIconSuffix
                  [for]="picker"
                ></mat-datepicker-toggle>
                <mat-datepicker #picker></mat-datepicker>
               </mat-form-field>
               <mat-form-field appearance="outline" class="col-6 px-1">
                <mat-label>Schedule Count Type</mat-label>
                <input
                  type="text"
                  matInput
                  formControlName="ff0005"
                  placeholder="Schedule Count Type"
                />
              </mat-form-field>
               <mat-form-field appearance="outline" class="col-6 px-1">
                <mat-label>Schedule Count</mat-label>
                <input
                  type="text"
                  matInput
                  formControlName="ff0006"
                  placeholder="Schedule Count"
                  (change)="onChangeScheduleCount()"

                />
                 <img
                  alt="lov img"
                  src="../../../../../../assets/searchfind.svg"
                  class="icon-size lovSearchButton"
                  color="primary"
                  (click)="openFrequencyListLOV()"
                />
              </mat-form-field>
               <mat-form-field appearance="outline" class="col-6 px-1">
                <mat-label>Frequency Type</mat-label>
                <input
                  type="text"
                  matInput
                  formControlName="ff0007"
                  placeholder="Frequency Type"
                  (change)="onChangeFrequencyType()"

                />
                 <img
                  alt="lov img"
                  src="../../../../../../assets/searchfind.svg"
                  class="icon-size lovSearchButton"
                  color="primary"
                  (click)="openFrequencyListLOV()"
                />
              </mat-form-field>
            </div>

              <div *ngIf="isUpdate" class="col-6 px-1">
                <mat-form-field appearance="outline" class="col-12">
                  <mat-label>Status</mat-label>
                  <input
                    type="text"
                    matInput
                    formControlName="status"
                    (change)="onChangeStatus()"
                  />
                  <img
                    alt="lov img"
                    src="../../../../../../assets/searchfind.svg"
                    class="icon-size lovSearchButton"
                    color="primary"
                    (click)="openStatusLOV()"
                  />
                </mat-form-field>
              </div>
          </div>
        </div>
      </div>
    </mat-card>
    <mat-card>
      <div class="p-2">
        <div class="section_header">
          <p class="section_header_title">Comments</p>
        </div>
      </div>

      <div>
        <div class="col-12">
          <div class="p-2">
            <div class="row no-gutters ms-1 me-1">
              <mat-form-field appearance="outline">
                <mat-label>Comments</mat-label>
                <textarea
                  type="text"
                  matInput
                  formControlName="comments"
                  placeholder="Comments"
                >
                </textarea>
              </mat-form-field>
            </div>
          </div>
        </div>
      </div>
    </mat-card>
  </form>
</div>
<div class="containerBTN">
  <div class="d-flex justify-content-center">
    <button
      mat-raised-button
      class="submitButton"
      (click)="isUpdate ? onUpdate() : onSaveConfirmation()"
      [class.isDisabledBtn]="DepartmentMaster.invalid"
    >
      {{
        isUpdate
          ? buttonLabelService.getLabel("submit")
          : buttonLabelService.getLabel("submit")
      }}
    </button>
    <button
      mat-raised-button
      class="submitButton"
      *ngIf="!isUpdate"
      (click)="onClear()"
    >
      Clear
    </button>
  </div>
</div>
